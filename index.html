<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLV — Bantuan Serba Bisa</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --o: #FF5C1A;
            --o2: #FF9500;
            --o3: #FFD000;
            --bg: #080808;
            --bg2: #0f0f0f;
            --bg3: #141414;
            --line: rgba(255, 255, 255, 0.06);
            --txt: #f4f4f4;
            --muted: #555;
            --soft: #888;
            --card: #111111;
            --radius: 16px;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg);
            color: var(--txt);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1000;
            opacity: 0.35;
        }

        #prog {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--o), var(--o2), var(--o3));
            z-index: 500;
            width: 0%;
            transition: width 0.08s linear;
            box-shadow: 0 0 10px var(--o);
            border-radius: 0 2px 2px 0;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 400;
            padding: 0 48px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(8, 8, 8, 0.88);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--line);
        }
        .nav-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            letter-spacing: 5px;
            color: #fff;
            cursor: pointer;
            position: relative;
        }
        .nav-brand .v {
            color: var(--o);
        }
        .nav-brand::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--o), var(--o2));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-brand:hover::after {
            transform: scaleX(1);
        }
        .nav-links {
            display: flex;
            gap: 0;
            list-style: none;
        }
        .nav-link {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 8px 18px;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            transition: color 0.3s;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 18px;
            right: 18px;
            height: 1px;
            background: var(--o);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-link:hover,
        .nav-link.active {
            color: var(--txt);
        }
        .nav-link:hover::after,
        .nav-link.active::after {
            transform: scaleX(1);
        }
        .nav-num {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--o);
            letter-spacing: 1px;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 100px 48px 60px;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 50% 60% at 20% 50%, rgba(255, 92, 26, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 40% 50% at 80% 30%, rgba(255, 149, 0, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255, 92, 26, 0.05) 0%, transparent 60%);
            animation: bgShift 10s ease-in-out infinite alternate;
        }
        @keyframes bgShift {
            0% {
                opacity: 0.6;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.05);
            }
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: orbFloat 8s ease-in-out infinite alternate;
        }
        .orb-1 {
            width: 320px;
            height: 320px;
            background: rgba(255, 92, 26, 0.12);
            top: 10%;
            left: -5%;
            animation-duration: 9s;
        }
        .orb-2 {
            width: 200px;
            height: 200px;
            background: rgba(255, 149, 0, 0.08);
            top: 60%;
            right: 5%;
            animation-duration: 11s;
            animation-delay: 2s;
        }
        .orb-3 {
            width: 150px;
            height: 150px;
            background: rgba(255, 208, 0, 0.06);
            bottom: 20%;
            left: 35%;
            animation-duration: 7s;
            animation-delay: 1s;
        }
        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(20px, -30px) scale(1.1);
            }
        }
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }
        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            animation: slideInLeft 0.8s 0.2s forwards;
            opacity: 0;
        }
        .hero-eyebrow-line {
            width: 40px;
            height: 1px;
            background: var(--o);
        }
        .hero-eyebrow-text {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--o);
        }
        .hero-eyebrow-badge {
            padding: 3px 10px;
            background: rgba(255, 92, 26, 0.1);
            border: 1px solid rgba(255, 92, 26, 0.25);
            border-radius: 3px;
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--o);
        }
        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(64px, 10vw, 140px);
            line-height: 0.9;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .hero-title-row {
            display: block;
            overflow: hidden;
            opacity: 0;
            animation: slideUp 0.9s forwards;
        }
        .hero-title-row:nth-child(1) {
            animation-delay: 0.35s;
        }
        .hero-title-row:nth-child(2) {
            animation-delay: 0.5s;
        }
        .hero-title .grd {
            background: linear-gradient(135deg, var(--o), var(--o2), var(--o3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-sub {
            font-size: 16px;
            font-weight: 300;
            color: var(--soft);
            line-height: 1.8;
            margin-top: 16px;
            margin-bottom: 32px;
            max-width: 500px;
            opacity: 0;
            animation: slideInLeft 0.8s 0.7s forwards;
        }
        .hero-sub strong {
            color: #bbb;
            font-weight: 500;
        }
        .hero-actions {
            display: flex;
            gap: 16px;
            align-items: center;
            opacity: 0;
            animation: fadeUp 0.7s 0.9s forwards;
        }
        .btn-main {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--o), var(--o2));
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-main::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, .15), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-main:hover::before {
            transform: translateX(0);
        }
        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(255, 92, 26, .4);
            filter: brightness(1.1);
        }
        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: transparent;
            color: var(--soft);
            border: 1px solid var(--line);
            border-radius: 4px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-ghost:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, .2);
            background: rgba(255, 255, 255, .04);
        }
        .btn-arrow {
            font-size: 18px;
            transition: transform 0.3s;
        }
        .btn-main:hover .btn-arrow,
        .btn-ghost:hover .btn-arrow {
            transform: translateX(4px);
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section {
            padding: 80px 48px;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .section+.section {
            border-top: 1px solid var(--line);
        }
        .sec-tag {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--o);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .sec-tag::before {
            content: '';
            width: 28px;
            height: 1px;
            background: var(--o);
        }
        .sec-h {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(38px, 5vw, 60px);
            letter-spacing: -1px;
            line-height: 0.95;
            color: #fff;
            margin-bottom: 16px;
        }
        .sec-h .acc {
            color: var(--o);
        }
        .sec-body {
            font-size: 15px;
            line-height: 1.9;
            color: var(--soft);
            font-weight: 300;
            max-width: 650px;
            margin-bottom: 40px;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal.vis {
            opacity: 1;
            transform: translateY(0);
        }

        .marquee-wrap {
            overflow: hidden;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            padding: 16px 0;
            background: var(--bg2);
            position: relative;
            z-index: 2;
        }
        .marquee-track {
            display: flex;
            animation: marquee 22s linear infinite;
            width: max-content;
        }
        .marquee-item {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            padding: 0 32px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 4px;
            color: var(--muted);
            white-space: nowrap;
        }
        .marquee-dot {
            width: 5px;
            height: 5px;
            background: var(--o);
            border-radius: 50%;
        }
        @keyframes marquee {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .desc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 40px;
        }
        .desc-card {
            background: var(--card);
            padding: 36px 30px;
            transition: background 0.3s;
            position: relative;
        }
        .desc-card:hover {
            background: var(--bg3);
        }
        .desc-icon {
            font-size: 32px;
            margin-bottom: 14px;
        }
        .desc-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 8px;
        }
        .desc-text {
            font-size: 13px;
            color: var(--soft);
            line-height: 1.7;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            margin-top: 40px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .tl-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            padding: 22px 28px;
            background: var(--card);
            border-bottom: 1px solid var(--line);
            transition: background 0.3s, padding-left 0.3s;
            cursor: default;
        }
        .tl-item:last-child {
            border-bottom: none;
        }
        .tl-item:hover {
            background: var(--bg3);
            padding-left: 36px;
        }
        .tl-step {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 92, 26, 0.12);
            border: 2px solid rgba(255, 92, 26, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            color: var(--o);
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .tl-item:hover .tl-step {
            background: var(--o);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 92, 26, 0.4);
        }
        .tl-content h4 {
            font-size: 14px;
            font-weight: 600;
            color: #ddd;
            margin-bottom: 4px;
        }
        .tl-content p {
            font-size: 12px;
            color: var(--soft);
            line-height: 1.6;
        }
        .tl-time {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-left: auto;
            flex-shrink: 0;
            padding-top: 2px;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 40px;
        }
        .price-card {
            background: var(--card);
            padding: 28px 26px;
            transition: background 0.3s;
            position: relative;
        }
        .price-card:hover {
            background: var(--bg3);
        }
        .price-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--o), var(--o2));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .price-card:hover::before {
            transform: scaleX(1);
        }
        .price-cat {
            font-family: 'Space Mono', monospace;
            font-size: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--o);
            margin-bottom: 6px;
        }
        .price-name {
            font-size: 15px;
            font-weight: 600;
            color: #ddd;
            margin-bottom: 4px;
        }
        .price-desc {
            font-size: 11px;
            color: var(--soft);
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .price-amount {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 1px;
            color: #fff;
        }
        .price-summary {
            margin-top: 32px;
            background: var(--bg2);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 28px 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
        }
        .price-summary-item {
            text-align: center;
        }
        .price-summary-label {
            font-family: 'Space Mono', monospace;
            font-size: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .price-summary-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size:
